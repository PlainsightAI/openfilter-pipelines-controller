# deployments.yml — Continuous deployment for openfilter-pipelines-controller.
# On every merge to main, build the image and push to GAR.
#
# ArgoCD (the openfilter-pipelines-controller ApplicationSet in PlainsightAI/gitops)
# utilizes the ArgoCD Image Updater in GKE to automatically reconcile and
# roll out the new image, avoiding any automated "plainsight-bot" commits
# to this repository.
name: Deployments

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish Docker image to GAR
        uses: PlainsightAI/gh-actions-public/publish-docker-image@main
        env:
          VERSION: ${{ github.sha }}
          IMAGE_REGISTRY: us-west1-docker.pkg.dev/plainsightai-prod/oci
        with:
          environment: production
