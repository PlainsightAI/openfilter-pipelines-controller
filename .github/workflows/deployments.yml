name: Deployments
permissions:
  contents: write
  id-token: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'deployment/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish Docker image to GAR
        uses: PlainsightAI/gh-actions-public/publish-docker-image@main
        env:
          VERSION: ${{ github.sha }}
          IMAGE_REGISTRY: us-west1-docker.pkg.dev/plainsightai-prod/oci
        with:
          environment: production

  deploy:
    needs: build
    uses: PlainsightAI/gh-actions-public/.github/workflows/deploy-service.yaml@main
    with:
      service-name: openfilter-pipelines-controller
      manifests-path: deployment
    secrets:
      GH_BOT_USER_PAT: ${{ secrets.GH_BOT_USER_PAT }}

  deploy-lab:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lab
        uses: PlainsightAI/gh-actions-public/deploy-env@main
        with:
          environment: lab
          service-name: openfilter-pipelines-controller
          manifests-path: deployment
          gh-bot-user-pat: ${{ secrets.GH_BOT_USER_PAT }}
