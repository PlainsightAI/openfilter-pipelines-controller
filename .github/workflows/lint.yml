name: Lint

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths-ignore:
      - 'deployment/**'
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    # Go linting adds no signal on a release tag; only the parity gate needs to run there.
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0

  chart-version-parity:
    name: Chart.yaml version/appVersion parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version, appVersion, and release tag agree
        run: |
          set -eu
          CHART=deployment/openfilter-pipelines-controller/Chart.yaml
          if [ ! -f "$CHART" ]; then
            echo "::error::Chart file not found: $CHART. The parity check cannot run — verify the chart path."
            exit 1
          fi
          VERSION=$(awk '/^version:/    {print $2}' "$CHART" | tr -d '"')
          APPVERSION=$(awk '/^appVersion:/ {print $2}' "$CHART" | tr -d '"')
          echo "version=$VERSION  appVersion=$APPVERSION"
          if [ -z "$VERSION" ] || [ -z "$APPVERSION" ]; then
            echo "::error file=$CHART::could not parse version/appVersion from $CHART"
            exit 1
          fi
          if [ "$VERSION" != "$APPVERSION" ]; then
            echo "::error file=$CHART::version ($VERSION) and appVersion ($APPVERSION) drifted. Bump both together in the same commit. See PR #48 for the slip this catches."
            exit 1
          fi
          # On a release tag (vX.Y.Z) Chart.yaml must already match the tag.
          # The publish-chart job packages with --version derived from the tag
          # (.github/workflows/docker-publish.yml), so a stale Chart.yaml ships a
          # chart whose source tree disagrees with the version it was published
          # under — which is exactly how main drifted to 0.5.1 while 0.6.x shipped.
          case "${GITHUB_REF:-}" in
            refs/tags/v*)
              TAG="${GITHUB_REF_NAME#v}"
              echo "release tag=$TAG"
              if [ "$VERSION" != "$TAG" ]; then
                echo "::error file=$CHART::Chart.yaml version ($VERSION) does not match release tag $GITHUB_REF_NAME (expected $TAG). Bump version and appVersion to $TAG before tagging."
                exit 1
              fi
              ;;
          esac
