name: Lint

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deployment/**'
  pull_request:

jobs:
  lint:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0

  chart-version-parity:
    name: Chart.yaml version/appVersion parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version and appVersion match
        run: |
          set -eu
          CHART=deployment/openfilter-pipelines-controller/Chart.yaml
          if [ ! -f "$CHART" ]; then
            echo "::error::Chart file not found: $CHART. The parity check cannot run — verify the chart path."
            exit 1
          fi
          VERSION=$(awk '/^version:/    {print $2}' "$CHART" | tr -d '"')
          APPVERSION=$(awk '/^appVersion:/ {print $2}' "$CHART" | tr -d '"')
          echo "version=$VERSION  appVersion=$APPVERSION"
          if [ -z "$VERSION" ] || [ -z "$APPVERSION" ]; then
            echo "::error file=$CHART::could not parse version/appVersion from $CHART"
            exit 1
          fi
          # version==appVersion is checked here (pre-merge, on PRs) for fast
          # developer feedback. The stricter "Chart.yaml must equal the release
          # tag" gate lives in the publish-chart job (docker-publish.yml), which
          # is the only place the tag exists AND the only place we publish — so a
          # mistagged release fails to publish rather than just flagging a check.
          if [ "$VERSION" != "$APPVERSION" ]; then
            echo "::error file=$CHART::version ($VERSION) and appVersion ($APPVERSION) drifted. Bump both together in the same commit. See PR #48 for the slip this catches."
            exit 1
          fi
