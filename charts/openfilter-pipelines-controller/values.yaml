# Default values for openfilter-pipelines-controller
# This is a YAML-formatted file.

# Number of controller replicas (should be 1 for leader election)
replicaCount: 1

# Controller image configuration
image:
  repository: plainsightai/openfilter-pipelines-controller
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

# Claimer init container image (used by the controller for batch pipeline jobs)
# Defaults to the same registry/org as the controller image
claimerImage:
  repository: plainsightai/openfilter-pipelines-claimer
  # Overrides the image tag whose default is the chart appVersion (same as the controller)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service account configuration (for the controller)
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# RBAC configuration (for the controller)
rbac:
  # Create ClusterRole and ClusterRoleBinding
  create: true

# Pipeline executor configuration removed — pods run with the default ServiceAccount.

# CRD installation
crds:
  # Install CRDs as part of the chart
  install: true
  # Keep CRDs on chart uninstall
  keep: true

# Controller configuration
controller:
  # Leader election settings
  leaderElection:
    enabled: true
    id: "443c3c67.plainsight.ai"

  # Metrics server configuration
  metrics:
    enabled: true
    port: 8443
    secureServing: true

  # Health probe configuration
  health:
    port: 8081
    livenessPath: /healthz
    readinessPath: /readyz

  # Webhook server configuration
  webhook:
    enabled: false
    port: 9443
    certDir: /tmp/k8s-webhook-server/serving-certs

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

# Service configuration (for metrics)
service:
  type: ClusterIP
  metricsPort: 8443
  healthPort: 8081

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Additional volumes
volumes: []

# Additional volume mounts
volumeMounts: []

# GPU node selector: comma-separated key=value pairs applied to pods that request
# nvidia.com/gpu resources (e.g. "cloud.google.com/gke-gpu-driver-version=latest").
# Leave empty to disable (no node selector is applied).
gpuNodeSelector: ""

# GPU library path: value injected as OPENFILTER_APPEND_LD_LIBRARY_PATH into GPU containers.
# The OpenFilter runtime reads this at startup and appends it to the existing LD_LIBRARY_PATH,
# preserving paths set by the container image. In some Kubernetes environments (e.g. GKE) the
# device plugin mounts libraries here but does not set LD_LIBRARY_PATH automatically.
# Set to an empty string to disable injection entirely (e.g. on EKS, AKS, or bare metal
# where the NVIDIA container runtime or driver installer sets LD_LIBRARY_PATH itself).
gpuLibraryPath: "/usr/local/nvidia/lib64"

# GPU bin path: value injected as OPENFILTER_APPEND_PATH into GPU containers so that nvidia-smi
# (used by OpenFilter for GPU utilization monitoring) is accessible. The OpenFilter runtime reads
# this at startup and appends it to the existing PATH, preserving paths set by the container image.
# Set to an empty string to disable injection entirely.
gpuBinPath: "/usr/local/nvidia/bin"

# Environment variables
env: []

# Additional arguments for the controller
args: []

# Valkey (Redis alternative) configuration
# See https://artifacthub.io/packages/helm/bitnami/valkey for all options
valkey:
  # Enable built-in Valkey installation
  # Set to false if using an external Valkey instance
  enabled: true

  # Valkey architecture (standalone or replication)
  architecture: standalone

  # Authentication
  auth:
    enabled: true
    # Password will be auto-generated if not specified
    password: ""

  # Primary configuration
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Replica configuration (only used if architecture is "replication")
  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # External Valkey configuration
  # Use this to connect to an existing Valkey instance instead of deploying one
  externalValkey:
    enabled: false
    host: ""
    port: 6379
    password: false
    # If password is true, specify the secret containing the password
    existingSecret: ""
    existingSecretPasswordKey: "password"
