image:
  repository: plainsightai/openfilter-pipelines-controller
  tag: "d4b6cab01bc3948410477931c2dfbc67fa153421" # {"$imagepolicy": "development:openfilter-pipelines-controller:tag"}
claimerImage:
  repository: plainsightai/openfilter-pipelines-claimer
telemetry:
  exporterType: otlp
  # Scheme prefix is load-bearing. openfilter ≥ 0.2.1 infers OTLP gRPC TLS
  # from the URL scheme — bare host:port silently flips to insecure=False
  # (TLS), and our in-cluster otel-collector terminates plaintext only, so
  # every export would fail the handshake with WRONG_VERSION_NUMBER. http://
  # keeps the inference at insecure=True against this plaintext receiver.
  exporterOtlpEndpoint: http://otel-collector.monitoring.svc.cluster.local:4317
# GPU filter pods schedule onto the GKE GPU node pool.
gpuNodeSelector: "cloud.google.com/gke-gpu-driver-version=latest"
# Connect to the cluster-managed Valkey instead of the bundled subchart.
# Precondition: the `openfilter-pipelines-controller` Secret (key
# VALKEY_PASSWORD) must exist in the release namespace.
valkey:
  enabled: false
  externalValkey:
    enabled: true
    host: "valkey-pipelines-controller.openfilter-system.svc.cluster.local"
    port: 6379
    password: true
    existingSecret: "openfilter-pipelines-controller"
    existingSecretPasswordKey: "VALKEY_PASSWORD"
