# Default values for openfilter-pipelines-controller
# This is a YAML-formatted file.

# Number of controller replicas (should be 1 for leader election)
replicaCount: 1

# Controller image configuration
image:
  repository: plainsightai/openfilter-pipelines-controller
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

# Claimer init container image (used by the controller for batch pipeline jobs)
# Defaults to the same registry/org as the controller image
claimerImage:
  repository: plainsightai/openfilter-pipelines-claimer
  # Overrides the image tag whose default is the chart appVersion (same as the controller)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Service account configuration (for the controller)
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# RBAC configuration (for the controller)
rbac:
  # Create ClusterRole and ClusterRoleBinding
  create: true

# Pipeline executor configuration removed — pods run with the default ServiceAccount.

# CRD installation
crds:
  # Install CRDs as part of the chart
  install: true
  # Keep CRDs on chart uninstall
  keep: true

# Controller configuration
controller:
  # Leader election settings
  leaderElection:
    enabled: true
    id: "443c3c67.plainsight.ai"

  # Metrics server configuration
  metrics:
    enabled: true
    port: 8443
    secureServing: true

  # Health probe configuration
  health:
    port: 8081
    livenessPath: /healthz
    readinessPath: /readyz

  # Webhook server configuration
  webhook:
    enabled: false
    port: 9443
    certDir: /tmp/k8s-webhook-server/serving-certs

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

# Service configuration (for metrics)
service:
  type: ClusterIP
  metricsPort: 8443
  healthPort: 8081

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: 8081
  initialDelaySeconds: 15
  periodSeconds: 20

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /readyz
    port: 8081
  initialDelaySeconds: 5
  periodSeconds: 10

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Additional volumes
volumes: []

# Additional volume mounts
volumeMounts: []

# GPU node selector: comma-separated key=value pairs applied to pods that request
# nvidia.com/gpu resources (e.g. "cloud.google.com/gke-gpu-driver-version=latest").
# Leave empty to disable (no node selector is applied). The GKE-specific value is
# set per environment in the gitops repo (controllers/openfilter-pipelines-controller/
# overrides/<env>.yaml), so the chart installs cleanly on
# non-GKE clusters (kind, minikube, EKS, bare metal) out of the box.
gpuNodeSelector: ""

# GPU library path: injected as LD_LIBRARY_PATH into GPU containers.
# On GKE the device plugin mounts libraries here but does not set LD_LIBRARY_PATH.
# Empty string disables injection (e.g. on EKS where the NVIDIA runtime handles it).
gpuLibraryPath: "/usr/local/nvidia/lib64"

# GPU bin path: value injected as OPENFILTER_APPEND_PATH into GPU containers so that nvidia-smi
# (used by OpenFilter for GPU utilization monitoring) is accessible. The OpenFilter runtime reads
# this at startup and appends it to the existing PATH, preserving paths set by the container image.
# Set to an empty string to disable injection entirely.
gpuBinPath: "/usr/local/nvidia/bin"

# GPU RuntimeClass: set on pods that request nvidia.com/gpu (e.g. "nvidia").
# Needed on clusters where the nvidia runtime is not the default containerd
# runtime (e.g. k3s, which auto-creates an "nvidia" RuntimeClass) — without it
# the GPU is allocated but the driver/CUDA libs are not injected. Empty string
# leaves RuntimeClassName unset (default runtime). Set per env in the gitops repo.
#
# WARNING: the named RuntimeClass must exist on the target cluster. If it does
# not, every GPU pod fails to schedule with "RuntimeClass not found". Leave empty
# on GKE/SaaS (the managed driver injects CUDA under the default runtime).
gpuRuntimeClass: ""

# Telemetry exporter values injected into every filter container the controller
# spawns. When non-empty, the controller appends TELEMETRY_EXPORTER_TYPE and
# TELEMETRY_EXPORTER_OTLP_ENDPOINT to the filter container env so openfilter's
# OTel client ships spans/metrics to the configured collector. Both empty
# disables injection (openfilter falls back to its silent exporter). The
# controller validates these on startup: setting one without the other is
# rejected at boot rather than silently disabling injection.
#
# Accepted exporterType values against today's openfilter:
#   - "otlp"      — gRPC for both traces AND metrics. Use this for production.
#   - "otlp_grpc" — gRPC for traces, but openfilter's metrics factory does not
#                   match this string and silently falls back to a console
#                   metric exporter (observability/client.py vs. tracing.py).
#                   Avoid until openfilter aligns the two factories.
#   - "otlp_http" — HTTP for traces only; metrics also fall back to console.
#   - "console" / "silent" — debug / no-op exporters.
#
# Example to enable (uncomment and adjust to your collector; the scheme prefix is load-bearing):
#   telemetry:
#     exporterType: otlp
#     exporterOtlpEndpoint: http://otel-collector.monitoring.svc.cluster.local:4317
#     # controllerOtlpEndpoint defaults to exporterOtlpEndpoint, so a single
#     # collector address covers both the controller's reconcile spans and the
#     # filter pods' spans. Override only when the controller and filters
#     # should ship to different collectors.
telemetry:
  exporterType: ""
  exporterOtlpEndpoint: ""
  # OTLP gRPC endpoint for the CONTROLLER's own reconcile spans (PLAT-1000).
  # The connection is plaintext gRPC; in-cluster OTel collector receivers do
  # not terminate TLS. When empty AND exporterOtlpEndpoint is also empty,
  # tracing is fully disabled and the global tracer stays a noop. Leave empty
  # to default to exporterOtlpEndpoint (the common case: one collector for
  # both controller and filter spans). To disable controller tracing while
  # keeping filter tracing on, override OTEL_EXPORTER_OTLP_ENDPOINT to ""
  # via .Values.env.
  controllerOtlpEndpoint: ""

# Environment variables
env: []

# Additional arguments for the controller
args: []

# Valkey (Redis alternative) configuration
# See https://artifacthub.io/packages/helm/bitnami/valkey for all options
valkey:
  # Enable the bundled Valkey subchart so the chart self-installs out of the box.
  # Environments that connect to a cluster-managed Valkey flip this to false and
  # enable externalValkey below — see the gitops repo overrides.
  enabled: true

  # Valkey architecture (standalone or replication)
  architecture: standalone

  # Authentication
  auth:
    enabled: true
    # Password will be auto-generated if not specified
    password: ""

  # Primary configuration
  primary:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Replica configuration (only used if architecture is "replication")
  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # External Valkey configuration
  # Use this to connect to an existing Valkey instance instead of deploying one.
  # Disabled by default; the cluster-managed host + auth Secret are environment-
  # specific and live in the gitops repo overrides, not in the chart defaults.
  externalValkey:
    enabled: false
    host: ""
    port: 6379
    password: false
    # If password is true, specify the secret containing the password
    existingSecret: ""
    existingSecretPasswordKey: "password"
